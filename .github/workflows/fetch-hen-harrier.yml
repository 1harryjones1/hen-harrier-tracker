name: Fetch hen harrier tag status

# Weekly - NE's own table has historically updated every ~8 weeks to 6
# months (doc §3/§9), so a weekly check is cheap and never misses an update
# by more than a few days.

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch: {}

concurrency:
  group: fetch-hen-harrier
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Fetch, diff, geolocate, and rebuild published data
        run: |
          python pipeline/fetch_hen_harrier_tags.py
          python pipeline/diff_and_detect.py
          python pipeline/geolocate_match.py
          python pipeline/build_site.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ site/data/ pipeline/config/
          git diff --staged --quiet || git commit -m "Automated: hen harrier tag update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  alert-on-failure:
    needs: fetch
    if: failure()
    uses: ./.github/workflows/alert-on-failure.yml
    with:
      workflow_name: "Fetch hen harrier tag status"
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
