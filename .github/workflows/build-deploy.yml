name: Build and deploy site

# Triggers broadly on any data change (not just data/published/**) and
# re-runs build_site.py itself before deploying - this makes the deploy
# self-healing even if a commit only touched data/review/** (e.g. a human
# flipping a review status without remembering to re-run build_site.py
# locally first).
#
# Also callable directly (workflow_call) - a push made with the default
# GITHUB_TOKEN (as the fetch workflows' own commits are) does not cascade
# to trigger other workflows via the `push` event, by GitHub's own design
# (an anti-infinite-loop safeguard). So the fetch workflows call this one
# explicitly as a job rather than relying on their commit to trigger it.

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "site/**"
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Build published data + site
        run: python pipeline/build_site.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
