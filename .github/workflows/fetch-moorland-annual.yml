name: Discover moorland/habitat layer URLs

# Monthly - the Moorland Change Map is republished under a new dataset name
# every year (doc §3/§9), so this can't be hardcoded. Re-running the ArcGIS
# Hub search monthly and committing pipeline/config/arcgis_layers.json makes
# a name change self-healing and visible as a diff, instead of a silent 404.

on:
  schedule:
    - cron: "0 7 1 * *"
  workflow_dispatch: {}

concurrency:
  group: fetch-moorland-annual
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Discover current layer URLs
        run: python pipeline/fetch_moorland_change.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline/config/arcgis_layers.json data/processed/fetch_status.json
          git diff --staged --quiet || git commit -m "Automated: refresh habitat layer discovery $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  alert-on-failure:
    needs: discover
    if: failure()
    uses: ./.github/workflows/alert-on-failure.yml
    with:
      workflow_name: "Discover moorland/habitat layer URLs"
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
